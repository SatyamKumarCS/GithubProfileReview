name: Render Keep-Alive

on:
  schedule:
    # Run every 14 minutes
    - cron: '*/14 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:


jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Services
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          echo " Starting Keep-Alive Ping..."
          
          if [ -z "$BACKEND_URL" ]; then
            echo " BACKEND_URL calculation skipped: secret not found."
          else
            echo " Pinging Backend: $BACKEND_URL"
            status=$(curl -s -L -o /dev/null -w "%{http_code}" --connect-timeout 10 "$BACKEND_URL")
            echo " Backend returned HTTP $status"
          fi
          
          if [ -z "$FRONTEND_URL" ]; then
            echo " FRONTEND_URL calculation skipped: secret not found."
          else
            echo "Pinging Frontend: $FRONTEND_URL"
            status=$(curl -s -L -o /dev/null -w "%{http_code}" --connect-timeout 10 "$FRONTEND_URL")
            echo "Frontend returned HTTP $status"
          fi
          
          echo "Keep-Alive sequence completed."
