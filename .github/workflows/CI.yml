name: Render Keep-Alive

on:
  schedule:
    # Run every 14 minutes
    - cron: '*/14 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:


jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Services
        run: |
          if [ -n "${{ secrets.BACKEND_URL }}" ]; then
            echo "Pinging Backend..."
            curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}
          else
            echo "BACKEND_URL secret not set. Skipping."
          fi
          
          if [ -n "${{ secrets.FRONTEND_URL }}" ]; then
            echo "Pinging Frontend..."
            curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }}
          else
            echo "FRONTEND_URL secret not set. Skipping."
          fi
